services:
  postgres:
    image: postgres:16-alpine
    container_name: orbitplan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbitplan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - orbitplan-postgres-data:/var/lib/postgresql/data

volumes:
  orbitplan-postgres-data:
